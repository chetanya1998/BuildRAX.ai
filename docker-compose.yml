services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/buildrax
      - NEXTAUTH_SECRET=development-secret
      - INNGEST_EVENT_KEY=development-key
    depends_on:
      - mongodb
      - inngest

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    command: ["dev", "--node-url", "http://app:3000/api/inngest"]

volumes:
  mongodb_data:
