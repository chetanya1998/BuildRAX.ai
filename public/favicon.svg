<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0A0A0B"/>
  <!-- Stylized B / node icon using isometric cubes -->
  <!-- Top face -->
  <polygon points="32,10 50,20 32,30 14,20" fill="url(#g)" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="50,20 50,38 32,48 32,30" fill="#4f46e5" opacity="0.85"/>
  <!-- Left face -->
  <polygon points="14,20 32,30 32,48 14,38" fill="#7c3aed" opacity="0.85"/>
  <!-- Inner highlight -->
  <polygon points="32,14 46,22 32,30 18,22" fill="white" opacity="0.08"/>
</svg>
